<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment project</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
</head>
<body class="raleway-normal">
    <header class="header">
        <nav>
            <h1 class="logo-style">LOGO</h1>
            <button class="primary-btn">Sign Up</button>
        </nav>
        <div class="banner-container">
            <h1 class="banner-title">Cool Dark UI Template for Webflow Agencies!</h1>
            <button class="primary-btn">Stay Focused</button>

        </div>
    </header>

    <main>

        <section class="preview-section">
            <div class="section-text">
                <h2 class="section-title">See It in Action</h2>
                <p class="section-des">Explore the live preview and imagine your brand in this bold new look.</p>
                <button class="primary-btn">Launch Live Preview</button>
            </div>
            <div>
                <img  class="section-img" src="Assets/wc-mini.png" alt="image">
            </div>

        </section>
        <section class="productive-users">
            <h2 class="container-heading">Joined Thousands of Productive Users</h2>
            <div class="container">
                <div class="content">
                    <h1 class="content-title">50K</h1>
                    <p class="content-des">Active Users</p>
                </div>
                <div class="content">
                    <h1 class="content-title">2M+</h1>
                    <p class="content-des">Focus Sessions</p>
                </div>
                <div class="content">
                    <h1 class="content-title">95%</h1>
                    <p class="content-des">Satisfaction Rate</p>
                </div>
            </div>

        </section>
    </main>

    <footer></footer>
</body>
</html>
